# kitchCU — single e2-small VM production compose.
#
# Differences vs the root docker-compose.yml (local dev):
#   - No source bind-mounts (baked image code only)
#   - Media: MinIO container by default (media-backend=minio), or GCS HMAC via env
#   - Postgres/Redis/gateway bind to 127.0.0.1 only
#   - Caddy terminates TLS for public hostnames
#   - Services run without --reload (command overrides below) to save RAM on e2-small
#
# Run from the repo root:
#   docker compose -f infra/gcp-vm/docker-compose.prod.yml --env-file infra/gcp-vm/.env up -d
# Fresh wipe (keep static IP):
#   sudo bash infra/gcp-vm/reset-fresh.sh

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ckac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ckac}
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ckac} -d ${POSTGRES_DB:-ckac}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Local object storage when GCS HMAC keys are blocked by org policy
  # (constraints/iam.disableServiceAccountKeyCreation). Set metadata media-backend=minio.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ckac}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-ckac_minio_dev}
    volumes:
      - minio_data:/data

  identity:
    build:
      context: ../..
      dockerfile: services/identity/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8001"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  catalog:
    build:
      context: ../..
      dockerfile: services/catalog/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8002"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }

  order:
    build:
      context: ../..
      dockerfile: services/order/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8003"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  billing:
    build:
      context: ../..
      dockerfile: services/billing/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
      IDENTITY_SERVICE_URL: http://identity:8001
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8004"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  notification:
    build:
      context: ../..
      dockerfile: services/notification/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
      ORDER_SERVICE_URL: http://order:8003
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8005"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      order: { condition: service_started }

  marketing:
    build:
      context: ../..
      dockerfile: services/marketing/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8006"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  ratings:
    build:
      context: ../..
      dockerfile: services/ratings/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8007"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  growth:
    build:
      context: ../..
      dockerfile: services/growth/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
      BILLING_SERVICE_URL: http://billing:8004
      NOTIFICATION_SERVICE_URL: http://notification:8005
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8008"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  delivery:
    build:
      context: ../..
      dockerfile: services/delivery/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8009"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  learning:
    build:
      context: ../..
      dockerfile: services/learning/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
      CATALOG_SERVICE_URL: http://catalog:8002
      NOTIFICATION_SERVICE_URL: http://notification:8005
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8010"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      catalog: { condition: service_started }
      notification: { condition: service_started }

  community:
    build:
      context: ../..
      dockerfile: services/community/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
      COMMUNITY_MIN_ORDERS_RANKING: "3"
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8011"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  streaming:
    build:
      context: ../..
      dockerfile: services/streaming/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ckac}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ckac}
      REDIS_URL: redis://redis:6379/0
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8012"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      IDENTITY_SERVICE_URL: http://identity:8001
      CATALOG_SERVICE_URL: http://catalog:8002
      ORDER_SERVICE_URL: http://order:8003
      BILLING_SERVICE_URL: http://billing:8004
      NOTIFICATION_SERVICE_URL: http://notification:8005
      MARKETING_SERVICE_URL: http://marketing:8006
      RATINGS_SERVICE_URL: http://ratings:8007
      GROWTH_SERVICE_URL: http://growth:8008
      DELIVERY_SERVICE_URL: http://delivery:8009
      LEARNING_SERVICE_URL: http://learning:8010
      COMMUNITY_SERVICE_URL: http://community:8011
      STREAMING_SERVICE_URL: http://streaming:8012
      REDIS_URL: redis://redis:6379/0
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:18000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=5)"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 90s
    depends_on:
      identity: { condition: service_started }
      catalog: { condition: service_started }
      order: { condition: service_started }
      billing: { condition: service_started }
      notification: { condition: service_started }
      marketing: { condition: service_started }
      ratings: { condition: service_started }
      growth: { condition: service_started }
      delivery: { condition: service_started }
      learning: { condition: service_started }
      community: { condition: service_started }
      streaming: { condition: service_started }
      redis: { condition: service_healthy }

  customer-web:
    build:
      context: ../../apps/website
      dockerfile: Dockerfile
      args:
        APP: customer
        VITE_CUSTOMER_APP_URL: https://customer.kitchcu.com
        VITE_KITCHEN_APP_URL: https://kitchen.kitchcu.com
        VITE_ADMIN_APP_URL: https://admin.kitchcu.com
    restart: unless-stopped
    depends_on:
      gateway: { condition: service_healthy }

  kitchen-web:
    build:
      context: ../../apps/website
      dockerfile: Dockerfile
      args:
        APP: kitchen
        VITE_CUSTOMER_APP_URL: https://customer.kitchcu.com
        VITE_KITCHEN_APP_URL: https://kitchen.kitchcu.com
        VITE_ADMIN_APP_URL: https://admin.kitchcu.com
    restart: unless-stopped
    depends_on:
      gateway: { condition: service_healthy }

  portal-web:
    build:
      context: ../../apps/website
      dockerfile: Dockerfile
      args:
        APP: portal
        VITE_CUSTOMER_APP_URL: https://customer.kitchcu.com
        VITE_KITCHEN_APP_URL: https://kitchen.kitchcu.com
        VITE_ADMIN_APP_URL: https://admin.kitchcu.com
    restart: unless-stopped

  admin-web:
    build:
      context: ../../apps/website
      dockerfile: Dockerfile
      args:
        APP: admin
        VITE_CUSTOMER_APP_URL: https://customer.kitchcu.com
        VITE_KITCHEN_APP_URL: https://kitchen.kitchcu.com
        VITE_ADMIN_APP_URL: https://admin.kitchcu.com
    restart: unless-stopped
    depends_on:
      gateway: { condition: service_healthy }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - portal-web
      - customer-web
      - kitchen-web
      - admin-web
      - gateway
      - minio

volumes:
  pgdata:
  minio_data:
  caddy_data:
  caddy_config:
