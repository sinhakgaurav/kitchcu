# Customer FAQ — paraphrase → answer_id
version: "2026-07-15"
audience: customer
entries:
  - answer_id: customer.pricing.why_charge
    option_set_id: customer.after_about
    paraphrases:
      - Why does kitchCU charge customers?
      - Why am I charged by the platform?
      - Where does delivery fee / platform fee go?
      - Server cost for customers
      - Do you take commission on my food?
    canonical_answer: |
      Your **food payment goes to the kitchen** — kitchCU takes **zero commission on food**.
      Charges you may see (delivery beyond free radius, shared/platform delivery rails, or live-stream bandwidth) fund the platform that protects **quality and health**: live-capture menus, verified ratings, ready-within honesty, and support when something goes wrong.

      Illustrative breakdown of a typical **₹60** platform-related delivery / quality rail fee:
      • Servers & data — ≈ ₹16 (27%)
      • Operations & reliability — ≈ ₹11 (18%)
      • Support (AI + human) — ≈ ₹14 (23%)
      • Streaming & live media rails — ≈ ₹10 (17%)
      • Quality & health assurance — ≈ ₹9 (15%)

      We charge for the care layer — not for a cut of your meal.
    facts_refs: [product, commission_on_food, cost_transparency]

  - answer_id: customer.find.kitchen
    option_set_id: customer.after_find
    paraphrases:
      - How do I find a kitchen?
      - Nearby kitchens
      - Kitchen code
      - Browse menu
    canonical_answer: |
      On **customer.kitchcu.in**:
      • Enter a kitchen code (e.g. CKPNQ001) from your home chef
      • Or use **Nearby** to list cloud kitchens by distance

      Menus use cuisine + veg/non-veg with live-capture photos.
    facts_refs: [domains]

  - answer_id: customer.order.checkout
    option_set_id: customer.after_order
    paraphrases:
      - Can I order online?
      - Checkout
      - Pay with UPI
      - COD
      - Cart
    canonical_answer: |
      Yes — browse the kitchen menu, add items, and checkout on customer.kitchcu.in.
      Sign in with **WhatsApp OTP**. Pay with COD, UPI, or online pay when offered by the kitchen.

      You can also message the kitchen on WhatsApp; the owner confirms the draft.
    facts_refs: [auth]

  - answer_id: customer.trust.live_capture
    option_set_id: customer.after_trust
    paraphrases:
      - Why live capture?
      - Are photos real?
      - Stock images?
    canonical_answer: |
      Every hero dish photo is **live-captured in the kitchen** — not stock.
      You see what the home chef actually cooks. That's kitchCU's trust promise.
    facts_refs: [menu]

  - answer_id: customer.delivery.fees
    option_set_id: customer.after_delivery
    paraphrases:
      - Delivery fee
      - Delivery radius
      - Pickup
    canonical_answer: |
      Delivery fees and radius are set by each kitchen — fair pricing without aggregator markups.
      Check the kitchen menu page for prep time and delivery options.
    facts_refs: []

  - answer_id: customer.support.contact
    option_set_id: customer.after_support
    paraphrases:
      - Order issue
      - Who do I contact?
      - Refund
      - Help
    canonical_answer: |
      For order issues, contact the **kitchen directly first** — kitchCU connects you to the home chef.
      Platform help: **hello@kitchcu.in**. I can also open a ticket if you want.
    facts_refs: [support]

  - answer_id: customer.about.platform
    option_set_id: customer.after_about
    paraphrases:
      - What is kitchCU?
      - About this app
    canonical_answer: |
      kitchCU helps you discover and trust **home food businesses & cloud kitchens** near you —
      live-capture menus, kitchen codes / Nearby, and direct relationships (no aggregator games).
    facts_refs: [product]

