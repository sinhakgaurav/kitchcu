server {
    listen 80;
    root /usr/share/nginx/html;
    index customer.html;

    location / {
        try_files $uri $uri/ /customer.html;
    }

    location /api/ {
        # Docker embedded DNS — re-resolve gateway after container restarts
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $gateway_upstream gateway;
        include /etc/nginx/conf.d/api-proxy.conf;
        proxy_pass http://$gateway_upstream:8000;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
